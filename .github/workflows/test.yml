name: Test

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.25"
          cache-dependency-path: |
            core/go.sum
            cli/go.sum
            backend/go.sum

      - name: Test
        run: go test ./core/... ./cli/... ./backend/...

      - name: Build CLI
        run: go build -o finops ./cli/cmd/finops

      - name: Build backend
        run: go build -o finops-backend ./backend/cmd/finops-backend
